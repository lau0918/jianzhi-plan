<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>减脂执行跟踪</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="status-card today-hero-card">
        <div class="status-head">
          <div>
            <p class="section-kicker">今日下一步</p>
            <h1 id="todayStatus">今天还没开始</h1>
          </div>
          <div id="statusBadge" class="status-badge status-neutral">待开始</div>
        </div>
        <p id="todayReason" class="status-copy">先记录第一餐。</p>
        <div class="window-timeline" aria-label="进食窗口时间轴">
          <div class="window-time-labels">
            <span id="windowStartLabel">--:--</span>
            <span id="windowEndLabel">--:--</span>
          </div>
          <div class="window-track">
            <div id="windowProgressFill" class="window-progress-fill"></div>
            <span id="windowNowDot" class="window-now-dot"></span>
          </div>
          <p id="windowStateLabel" class="window-state-label">当前状态 -</p>
        </div>
        <p id="fastingRule" class="status-rule micro-rule">窗口外只喝水</p>
        <div class="status-chips">
          <span id="windowChip" class="chip">窗口 -</span>
          <span id="mealCountChip" class="chip">进食 0 次</span>
          <span id="outWindowChip" class="chip">窗口外 0 次</span>
        </div>
        <div class="status-actions next-action-panel">
          <button id="quickMealBtn" class="primary-btn">记录第一餐</button>
          <button id="quickWeightBtn" class="secondary-btn">记录体重</button>
        </div>
      </section>

      <section class="hero-shell">
        <div class="hero-card goal-summary-card">
          <div class="hero-topline">
            <p class="eyebrow">目标摘要</p>
            <div class="hero-actions">
              <button id="openAuthBtn" class="ghost-link ghost-link-muted">解锁</button>
              <button id="openSettingBtn" class="ghost-link">编辑目标</button>
            </div>
          </div>
          <div class="hero-summary">
            <div class="hero-copy">
              <h2 id="heroHeadline">先设置减脂目标</h2>
              <p id="heroSubline" class="hero-subline">设置后显示进度。</p>
              <p id="goalSourceText" class="source-pill">本地</p>
            </div>
          </div>

          <div class="progress-panel goal-progress-panel" aria-label="减脂进度路线图">
            <div class="goal-progress-head">
              <div>
                <p class="progress-label">目标进度</p>
                <strong id="goalProgressText" class="goal-progress-number">-</strong>
              </div>
              <div class="goal-progress-copy">
                <p id="goalCycleSummary" class="hero-footnote">还差 - kg · 剩余 - 天</p>
                <p id="cycleGoalTag" class="status-badge status-neutral cycle-goal-tag">周期状态：待评估</p>
              </div>
            </div>
            <div class="progress-row compact">
              <div class="progress-track">
                <div id="goalProgressBar" class="progress-fill"></div>
              </div>
            </div>
            <div class="weight-route" aria-label="体重路线">
              <span id="startWeightInline">-</span>
              <span class="route-arrow">→</span>
              <span id="currentWeightInline">-</span>
              <span class="route-arrow">→</span>
              <span id="targetWeightInline">-</span>
            </div>
            <p id="paceText" class="hero-footnote">节奏判定 -</p>
          </div>

        </div>
      </section>

      <section class="coach-card compact-card">
        <div class="compact-head">
          <p class="section-kicker">动</p>
          <button id="toggleCoachBtn" class="ghost-link ghost-link-muted">更多动作</button>
        </div>
        <div class="coach-chips compact-chips">
          <span id="coachStatus" class="status-badge status-neutral">待跟进</span>
          <span id="exerciseChip" class="chip">运动 - 分钟</span>
        </div>
        <p id="coachMessage" class="micro-note">-</p>
        <div id="coachActions" class="coach-actions hidden">
          <button id="sleepShortBtn" class="secondary-btn">睡眠<6h</button>
          <button id="sleepMidBtn" class="secondary-btn">睡眠6-7h</button>
          <button id="sleepLongBtn" class="secondary-btn">睡眠>7h</button>
          <button id="exercise20Btn" class="secondary-btn">运动20</button>
          <button id="exercise10Btn" class="secondary-btn">+10分</button>
        </div>
      </section>

      <section class="feed-card reminder-card">
        <div class="feed-head">
          <div>
            <p class="section-kicker">最近复盘</p>
            <h3 id="reminderTitle">风险摘要</h3>
          </div>
          <button id="toggleFeedBtn" class="ghost-link ghost-link-muted">全部记录</button>
        </div>
        <div class="risk-meter" aria-label="近7天风险比例">
          <div id="riskMeterFill" class="risk-meter-fill"></div>
        </div>
        <p id="reviewSummary" class="review-summary">稳定 · 偏离 0 · 缺记 0</p>
        <div id="reminderHighlights" class="reminder-list"></div>

        <div id="recordsPanel" class="records-panel hidden">
          <div class="records-toolbar">
            <button id="toggleRecentBtn" class="feed-toggle-btn">查看全部</button>
          </div>
          <p id="feedHint" class="feed-hint">默认显示最近5条</p>
          <div id="feedList" class="feed-list"></div>
        </div>
      </section>

      <p id="message" class="toast"></p>
    </main>

    <div id="sheetMask" class="sheet-mask hidden"></div>

    <section id="mealSheet" class="sheet hidden">
      <h3>进食</h3>
      <input id="mealFoodInput" placeholder="食物" maxlength="80" />
      <label>餐量</label>
      <div class="chip-group" data-chip-group="mealAmount" data-chip-mode="single">
        <button type="button" class="chip-toggle" data-value="少量">少量</button>
        <button type="button" class="chip-toggle active" data-value="正常">正常</button>
        <button type="button" class="chip-toggle" data-value="过量">过量</button>
      </div>
      <label>饮食类型</label>
      <div class="chip-group" data-chip-group="mealDiet" data-chip-mode="multi">
        <button type="button" class="chip-toggle" data-value="自煮">自煮</button>
        <button type="button" class="chip-toggle" data-value="外卖">外卖</button>
        <button type="button" class="chip-toggle" data-value="轻食">轻食</button>
      </div>
      <label>风险场景</label>
      <div class="chip-group" data-chip-group="mealRisk" data-chip-mode="multi">
        <button type="button" class="chip-toggle" data-value="加班">加班</button>
        <button type="button" class="chip-toggle" data-value="应酬">应酬</button>
        <button type="button" class="chip-toggle" data-value="熬夜">熬夜</button>
        <button type="button" class="chip-toggle" data-value="情绪波动">情绪波动</button>
        <button type="button" class="chip-toggle" data-value="出差">出差</button>
      </div>
      <input id="mealTimeInput" type="datetime-local" />
      <input id="mealNoteInput" placeholder="备注" maxlength="80" />
      <div class="sheet-actions">
        <button class="secondary-btn" data-close="mealSheet">取消</button>
        <button id="saveMealBtn" class="primary-btn">保存</button>
      </div>
    </section>

    <section id="weightSheet" class="sheet hidden">
      <h3>体重</h3>
      <input id="weightValueInput" type="number" step="0.1" min="1" placeholder="kg" />
      <input id="weightTimeInput" type="datetime-local" />
      <input id="weightNoteInput" placeholder="备注" maxlength="80" />
      <div class="sheet-actions">
        <button class="secondary-btn" data-close="weightSheet">取消</button>
        <button id="saveWeightBtn" class="primary-btn">保存</button>
      </div>
    </section>

    <section id="authSheet" class="sheet hidden">
      <h3>访问密钥</h3>
      <input id="authTokenInput" placeholder="输入 AUTH_TOKEN" maxlength="80" />
      <div class="sheet-actions">
        <button class="secondary-btn" data-close="authSheet">取消</button>
        <button id="saveAuthBtn" class="primary-btn">保存</button>
      </div>
    </section>

      <section id="settingSheet" class="sheet hidden">
        <h3>目标</h3>
        <label>开始</label>
        <input id="goalStartDateInput" type="date" />
        <label>结束</label>
        <input id="goalEndDateInput" type="date" />
        <label>初始(kg)</label>
        <input id="goalStartWeightInput" type="number" step="0.1" min="1" />
      <label>目标(kg)</label>
      <input id="goalTargetWeightInput" type="number" step="0.1" min="1" />
      <label>窗口起点</label>
      <input id="windowStartInput" type="time" value="10:00" />
      <label>窗口时长</label>
      <input id="windowHoursInput" type="number" min="1" max="24" step="1" value="8" />
      <p class="sheet-note">初始化会清空测试数据。</p>
      <div class="sheet-actions sheet-actions-stack">
        <button id="resetLocalBtn" class="secondary-btn danger-btn" type="button">清空本地</button>
        <button id="resetAllBtn" class="secondary-btn danger-btn" type="button">清空云端</button>
      </div>
      <div class="sheet-actions">
        <button class="secondary-btn" data-close="settingSheet">取消</button>
        <button id="saveSettingBtn" class="primary-btn">保存</button>
      </div>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
