name: Meal Reminder (Telegram)

on:
  schedule:
    # Asia/Shanghai 08:00 / 12:00 / 15:00 => UTC 00:00 / 04:00 / 07:00
    - cron: "0 0,4,7 * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_MEALS_DB: ${{ secrets.NOTION_MEALS_DB }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REMINDER_WINDOW: ${{ secrets.REMINDER_WINDOW }}
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run reminder
        run: python3 notion_reminder.py
