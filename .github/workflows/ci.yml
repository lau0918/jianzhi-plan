name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run regression tests
        run: python3 regression_tests.py
